server {
    listen 80;
    server_name eathub.ir;

    client_max_body_size 50M;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name eathub.ir;

    ssl_certificate /etc/letsencrypt/live/eathub.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eathub.ir/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        client_max_body_size 50M;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ======================
    # STATIC / MEDIA
    # ======================
    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }
}