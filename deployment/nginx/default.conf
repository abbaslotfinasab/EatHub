server {
    listen 443 ssl;
    server_name eathub.ir;

    # ======================
    # SSL CERTS
    # ======================
    ssl_certificate /etc/letsencrypt/live/eathub.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eathub.ir/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ======================
    # FRONTEND (React)
    # ======================
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ======================
    # BACKEND (Django API)
    # ======================
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ======================
    # STATIC / MEDIA
    # ======================
    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }
}