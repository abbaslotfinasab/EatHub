version: "3.9"

services:

  backend:
    build: ../backend
    container_name: eathub_backend
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis

  frontend:
    build: ../frontend
    container_name: eathub_frontend
    ports:
      - "3000
:3000"
  db:
    image: postgres:16
    container_name: eathub_db
    restart: always
    environment:
      POSTGRES_DB: eathub
      POSTGRES_USER: eathub
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: eathub_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  redis:
    image: redis:7
    container_name: eathub_redis
    ports:
      - "6379:6379"

  celery:
    build: ../backend
    container_name: eathub_celery
    command: celery -A config worker -l info
    env_file:
      - ../backend/.env
    depends_on:
      - redis
      - db

volumes:
  postgres_data: