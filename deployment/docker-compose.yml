services:

  backend:
    build: ../backend
    container_name: eathub_backend
    command: gunicorn EatHub.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ../backend/media:/app/media
    networks:
      - eathub

  frontend:
    build: ../frontend
    container_name: eathub_frontend
    expose:
      - "80"
    networks:
      - eathub

  db:
    image: postgres:16
    container_name: eathub_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eathub

  redis:
    image: redis:7
    container_name: eathub_redis
    networks:
      - eathub

  celery:
    build: ../backend
    command: celery -A config worker -l info
    depends_on:
      - backend
      - redis
      - db
    networks:
      - eathub

  nginx:
    image: nginx:alpine
    container_name: eathub_nginx
    ports:
      - "80:80"
    volumes:
      - ../backend/media:/app/media
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - backend
      - frontend
    networks:
      - eathub

volumes:
  postgres_data:


networks:
  eathub:
    driver: bridge