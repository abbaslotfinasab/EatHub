services:

  backend:
    build: ../backend
    container_name: eathub_backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis

  frontend:
    build: ../frontend
    container_name: eathub_frontend
    expose:
      - "80"

  db:
    image: postgres:16
    container_name: eathub_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: eathub_redis

  celery:
    build: ../backend
    command: celery -A config worker -l info
    depends_on:
      - backend
      - redis
      - db

  nginx:
    image: nginx:alpine
    container_name: eathub_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data: